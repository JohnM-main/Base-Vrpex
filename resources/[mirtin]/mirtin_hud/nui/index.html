<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="transitions.css">
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    
</head>
<body class="hud" style="display: none;">
     <img id = "logo" class = 'logo logo-animation' src="https://i.imgur.com/Ta9YOaY.png" alt=""> <!-- Colocar dentro do src o link da logo do servidor -->

    <header> 
        <div class = 'infoText location'>
            <img src="images/loc.svg" alt="">
            <p> Vespucci Boulevard <span style="color: white; margin: 3px;">|</span> <span>Oeste</span></p>
        </div>

        <div class = 'infoFooter-container'>
            <div class = 'infoText radio' style = 'margin-right: 25px;'>
                <img src="images/freq.svg" alt="">
                <p> 69.00<span>Mhz</span></p>
            </div>
            
            <div class = 'infoText'  >
                <img src="images/clock.svg" alt="">
                <p class = 'hour'>12:30</p>
            </div>
        </div>
    </header>

    <div class = 'carHud-container'>
        <div class = 'gasText'>
            <p class = 'gasAmount'>90<span>%</span></p>
            <img src="images/gas.svg" alt="">
        </div>

        <div class="veloBar" clipPathUnits="objectBoundingBox">
            <div class = 'veloFill'></div>
        </div>

        <div class = 'veloText'>
            <img src="images/seatbelt.svg" class ='opacity seatbelt' alt="">
            <h1 class = 'velo'><span class = 'defaultVelo'>0</span>96<span class = 'kmText'>KMH</span></h1>
        </div>
    </div>

    <main class = 'normalContainer'>
        <div class = 'normalHud-container'>
            
            <div class = 'hudLife-container'>

                <div class = 'hud-container'>
                    <img src="images/life.svg" alt="">
                    <div class = 'hudFill-container'>
                        <div class = 'hudFill' id = 'lifeFill' style = "background-color: rgb(255, 0, 0);"></div>
                    </div>
                </div>

                <div id = "shield-container" class = 'hud-container'>
                    <img src="images/shield.svg" alt="">
                    <div class = 'hudFill-container'>
                        <div class = 'hudFill' id = 'shield' style="width: 39%; background-color: rgb(46, 113, 175);"></div>
                    </div>
                </div>
            </div>
            

            <div class = 'hudFood-container' style=" margin-bottom: 0px;">
                <div class = 'hud-container'>
                    <img src="images/water.svg" alt="">
                    <div class = 'hudFill-container'>
                        <div class = 'hudFill' id = 'water' style = "background-color: rgb(255, 255, 255);"></div>
                    </div>
                </div>

                <div class = 'hud-container' style="margin-left: 10px; margin-bottom: 0px;" >
                    <img src="images/food.svg" alt="">
                    <div class = 'hudFill-container'>
                        <div class = 'hudFill' id = 'food' style = "background-color: rgb(255, 255, 255);"></div>
                    </div>
                </div>
            </div>

            <div id="outerdiv">
                <img src="images/progress.png" style = "position: absolute; left: -11%; top: -4px; width: 7%;" alt="">
                <div id="innerdiv"></div>
            </div>
        </div>
    </main>

    <footer>
        <p class = 'talkText'>Susurrando</p>
        <div class = 'qTalk' id ='v1'></div>
        <div class = 'qTalk' id ='v2'></div>
        <div class = 'qTalk' id ='v3'></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
